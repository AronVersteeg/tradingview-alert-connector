<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snoek Dashboard</title>
  <style>
    :root {
      --bg: #0d1625;
      --panel: #101d31;
      --panel-2: #14243c;
      --ink: #eef6ff;
      --muted: #9fb1c9;
      --line: #2a3e5e;
      --accent: #42a5ff;
      --accent-2: #35d09f;
      --warn: #ffd166;
      --water: #12365b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: radial-gradient(circle at top, #182841 0, var(--bg) 42rem);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 20px 0 38px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 30px;
      letter-spacing: 0;
    }

    h2 { font-size: 17px; }
    h3 { font-size: 14px; }

    .muted { color: var(--muted); }
    .warning { color: var(--warn); }

    .layout {
      display: grid;
      grid-template-columns: minmax(290px, 370px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: rgba(16, 29, 49, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(20, 36, 60, 0.58);
    }

    .panel-body { padding: 16px; }

    .stack { display: grid; gap: 14px; }

    form { display: grid; gap: 11px; }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      color: var(--ink);
      background: #0d1727;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    button {
      min-height: 42px;
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      color: #06111f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      cursor: pointer;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .dial {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 28px;
      font-weight: 900;
      background:
        radial-gradient(circle at center, #101d31 0 52%, transparent 53%),
        conic-gradient(var(--accent) calc(var(--score, 0) * 1%), #263a59 0);
      border: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      color: #bfe7ff;
      background: #173154;
      border: 1px solid #284a75;
      font-size: 12px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-card {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0e1a2d;
    }

    .mini-card strong {
      display: block;
      margin-top: 5px;
      font-size: 20px;
    }

    .map-wrap {
      position: relative;
      min-height: 360px;
      border-radius: 8px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: linear-gradient(180deg, #102033, #0b1424);
    }

    svg { display: block; width: 100%; height: 360px; }

    .map-label {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 6px 8px;
      border-radius: 999px;
      color: #bfe7ff;
      background: rgba(10, 21, 36, 0.78);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1b2d;
    }

    .card + .card { margin-top: 0; }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    li { margin: 4px 0; }

    .table {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(42, 62, 94, 0.75);
      align-items: center;
      font-size: 13px;
    }

    .row:last-child { border-bottom: 0; }

    @media (max-width: 880px) {
      header { display: grid; }
      .layout { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Snoek Dashboard</h1>
        <p class="muted">Offline seedkaart + visactiviteit + broncatalogus voor Velsen/Spaarnwoude.</p>
      </div>
      <span class="badge">v2 kaartdata seedlaag</span>
    </header>

    <section class="layout">
      <aside class="stack">
        <section class="panel">
          <div class="panel-header">
            <h2>Input data</h2>
          </div>
          <div class="panel-body">
            <form id="scout-form">
              <label>
                Doel
                <select name="target">
                  <option value="snoek">Snoek / roofvis</option>
                  <option value="method_feeder">Method feeder</option>
                  <option value="witvis">Witvis</option>
                </select>
              </label>
              <label>
                Locatie
                <input name="location" value="Velsen-Zuid">
              </label>
              <div class="grid-2">
                <label>Temperatuur C <input name="temperatureC" type="number" value="21"></label>
                <label>Wind Bft <input name="windBft" type="number" min="0" max="12" value="3"></label>
              </div>
              <div class="grid-2">
                <label>Bewolking % <input name="cloudCoverPct" type="number" min="0" max="100" value="69"></label>
                <label>
                  Moment
                  <select name="timeOfDay">
                    <option value="morning">Ochtend</option>
                    <option value="midday">Middag</option>
                    <option value="evening" selected>Avond</option>
                    <option value="night">Nacht</option>
                  </select>
                </label>
              </div>
              <div class="grid-2">
                <label>
                  Luchtdruk
                  <select name="pressureTrend">
                    <option value="falling">Dalend</option>
                    <option value="steady" selected>Stabiel</option>
                    <option value="rising">Stijgend</option>
                  </select>
                </label>
                <label>
                  Regen
                  <select name="rain">
                    <option value="none" selected>Geen</option>
                    <option value="light">Licht</option>
                    <option value="heavy">Zwaar</option>
                  </select>
                </label>
              </div>
              <button type="submit">Bereken stekken</button>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Databronnen</h2>
          </div>
          <div class="panel-body">
            <div id="sources" class="table"></div>
          </div>
        </section>
      </aside>

      <section class="stack">
        <section class="panel">
          <div class="panel-header">
            <h2>Snoek index</h2>
          </div>
          <div class="panel-body" id="result">
            <p class="muted">Scout wordt geladen...</p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Offline viskaart</h2>
          </div>
          <div class="panel-body">
            <div class="map-wrap">
              <span class="map-label">Seedlaag: Esri/RWS/AHN-ready</span>
              <svg viewBox="0 0 100 100" aria-label="Offline kaart met visstekken">
                <rect width="100" height="100" fill="#0b1526"></rect>
                <path d="M5 65 C20 60, 28 54, 40 54 C54 54, 63 45, 80 43 C88 42, 93 39, 98 35" fill="none" stroke="#2f8cff" stroke-width="2.5"></path>
                <path d="M14 78 C31 74, 44 75, 58 77 C72 80, 84 78, 96 72" fill="none" stroke="#1e6ab7" stroke-width="2"></path>
                <path d="M0 50 L100 30" stroke="#637696" stroke-width="0.35"></path>
                <path d="M22 28 L32 88 M44 32 L44 58 M66 20 L62 82 M78 30 L90 18" stroke="#49617f" stroke-width="0.55"></path>
                <g id="map-features"></g>
              </svg>
            </div>
            <div id="feature-list" class="cards" style="margin-top: 12px;"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Community reviews</h2>
          </div>
          <div class="panel-body">
            <div id="reviews" class="cards"></div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const form = document.getElementById('scout-form');
    const result = document.getElementById('result');
    const sources = document.getElementById('sources');
    const mapFeatures = document.getElementById('map-features');
    const featureList = document.getElementById('feature-list');
    const reviews = document.getElementById('reviews');

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function list(items) {
      return `<ul>${items.map((item) => `<li>${esc(item)}</li>`).join('')}</ul>`;
    }

    function renderScore(data) {
      const input = data.input;
      result.innerHTML = `
        <div class="score-grid">
          <div class="dial" style="--score:${data.score}">${data.score}</div>
          <div>
            <h3>${esc(data.summary)}</h3>
            <p class="muted">${esc(data.action)}</p>
            <div class="badge-row">
              <span class="badge">${esc(input.temperatureC)} C</span>
              <span class="badge">${esc(input.windBft)} Bft</span>
              <span class="badge">${esc(input.cloudCoverPct)}% bewolking</span>
              <span class="badge">${esc(input.pressureTrend)}</span>
            </div>
          </div>
        </div>
        <div class="mini-grid" style="margin-top: 14px;">
          <div class="mini-card"><span class="muted">Weer</span><strong>${esc(input.temperatureC)} C</strong><span class="muted">${esc(input.cloudCoverPct)}% bewolkt</span></div>
          <div class="mini-card"><span class="muted">Luchtdruk</span><strong>${esc(input.pressureTrend)}</strong><span class="muted">handmatige input</span></div>
          <div class="mini-card"><span class="muted">Maan/zon</span><strong>${esc(data.activityWindows[0].times[1])}</strong><span class="muted">grote tijd</span></div>
        </div>
        <div class="cards" style="margin-top: 14px;">
          <div class="card"><h3>Waarom</h3>${list(data.reasons)}</div>
          <div class="card"><h3>Aanpak</h3>${list(data.tactics)}</div>
          ${data.warnings.length ? `<div class="card warning"><h3>Let op</h3>${list(data.warnings)}</div>` : ''}
        </div>
      `;
    }

    function renderSources(data) {
      sources.innerHTML = data.dataSources.map((source) => `
        <div class="row">
          <strong>${esc(source.status)}</strong>
          <span>${esc(source.label)}<br><span class="muted">${esc(source.use)}</span></span>
          <span class="badge">${esc(source.id)}</span>
        </div>
      `).join('');
    }

    function markerColor(type) {
      return {
        depth: '#42a5ff',
        bridge: '#ffd166',
        reed: '#35d09f',
        inlet: '#b388ff',
        parking: '#ffffff',
        review: '#ff8fab',
        route: '#9fb1c9'
      }[type] || '#42a5ff';
    }

    function renderMap(data) {
      mapFeatures.innerHTML = data.mapFeatures.map((feature) => `
        <g tabindex="0">
          <circle cx="${feature.x}" cy="${feature.y}" r="${feature.type === 'route' ? 3 : 4.4}" fill="${markerColor(feature.type)}" opacity="0.92"></circle>
          <text x="${feature.x + 3}" y="${feature.y - 4}" fill="#dcecff" font-size="3">${esc(feature.name)}</text>
        </g>
      `).join('');
      featureList.innerHTML = data.mapFeatures.map((feature) => `
        <div class="card">
          <h3>${esc(feature.name)} <span class="badge">+${esc(feature.scoreBoost)}</span></h3>
          <p class="muted">${esc(feature.layer)} · ${esc(feature.description)}</p>
        </div>
      `).join('');
    }

    function renderReviews(data) {
      reviews.innerHTML = data.communityReviews.map((review) => {
        const spot = data.spots.find((item) => item.id === review.spotId);
        return `
          <div class="card">
            <h3>${esc(spot ? spot.name : review.spotId)} <span class="badge">${'★'.repeat(review.rating)}</span></h3>
            <p class="muted">${esc(review.source)} · betrouwbaarheid ${esc(review.confidence)}</p>
            <p style="margin-top: 8px;">${esc(review.note)}</p>
            <div class="badge-row">${review.baits.map((bait) => `<span class="badge">${esc(bait)}</span>`).join('')}</div>
          </div>
        `;
      }).join('');
    }

    async function runScout(event) {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(form).entries());
      result.innerHTML = '<p class="muted">Scout rekent...</p>';
      const response = await fetch('/snoek/api/scout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      renderScore(data);
      renderSources(data);
      renderMap(data);
      renderReviews(data);
    }

    form.addEventListener('submit', runScout);
    form.dispatchEvent(new Event('submit'));
  </script>
</body>
</html>
